<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Designer — Silly Little Friends v0.0.1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:     #1a1a1a;
            --panel:  #2a2a2a;
            --border: #444;
            --accent: #4a9eff;
            --text:   #e0e0e0;
            --muted:  #888;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
            font-size: 13px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        /* ── Layout ── */
        .app {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 210px;
            flex-shrink: 0;
            background: var(--panel);
            border-right: 1px solid var(--border);
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .canvas-wrap {
            flex: 1;
            overflow: auto;
            background: #0a0a0a;
            cursor: crosshair;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .statusbar {
            height: 26px;
            background: #1e1e1e;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 24px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--muted);
            flex-shrink: 0;
        }
        .statusbar b { color: var(--accent); }
        #statMsg { margin-left: auto; color: var(--accent); }

        /* ── Sidebar sections ── */
        .section-title {
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--accent);
            margin-bottom: 7px;
        }

        /* Name input */
        .name-input {
            width: 100%;
            padding: 6px 8px;
            background: #141414;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 13px;
        }
        .name-input:focus { outline: none; border-color: var(--accent); }

        /* Palette */
        .palette { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .palette-tile {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 7px;
            background: #141414;
            border: 2px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            transition: border-color 0.1s;
        }
        .palette-tile:hover  { border-color: #666; }
        .palette-tile.active { border-color: var(--accent); }
        .palette-swatch {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            border: 1px solid rgba(255,255,255,0.12);
            flex-shrink: 0;
        }
        .palette-label { font-size: 11px; }

        /* Tools */
        .tools { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .tool-btn {
            padding: 7px 4px;
            background: #141414;
            border: 2px solid var(--border);
            border-radius: 4px;
            color: var(--muted);
            cursor: pointer;
            font-size: 11px;
            text-align: center;
            transition: all 0.1s;
        }
        .tool-btn:hover  { border-color: #666; color: var(--text); }
        .tool-btn.active { border-color: var(--accent); color: var(--accent); }

        /* Zoom */
        .zoom-row { display: flex; align-items: center; gap: 8px; }
        .zoom-btn {
            width: 26px;
            height: 26px;
            background: #141414;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 17px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .zoom-btn:hover { border-color: var(--accent); }
        .zoom-label {
            flex: 1;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--accent);
        }

        /* Toggle */
        .toggle-row { display: flex; align-items: center; gap: 8px; cursor: pointer; margin-top: 8px; }
        .toggle-row input { cursor: pointer; accent-color: var(--accent); }
        .toggle-row span  { font-size: 12px; color: var(--muted); }

        /* History & file buttons */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .btn {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: #141414;
            color: var(--text);
            cursor: pointer;
            font-size: 11px;
            text-align: center;
            transition: all 0.1s;
            margin-bottom: 5px;
            line-height: 1.3;
        }
        .btn:last-child { margin-bottom: 0; }
        .btn:hover       { border-color: #888; }
        .btn.primary     { border-color: var(--accent); color: var(--accent); background: #0d1f30; }
        .btn.primary:hover { background: #152a40; }
        .btn.danger      { border-color: #c03030; color: #c03030; }
        .btn.danger:hover { background: #1e0a0a; }
        .btn:disabled    { opacity: 0.35; cursor: default; }
        .btn:disabled:hover { border-color: var(--border); background: #141414; }

        /* Keyboard hints */
        .hint { font-size: 10px; color: #555; margin-top: 2px; line-height: 1.5; }
        kbd {
            display: inline-block;
            background: #333;
            border: 1px solid #555;
            border-radius: 2px;
            padding: 0 3px;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="app">
    <!-- ── Sidebar ── -->
    <div class="sidebar">

        <div>
            <div class="section-title">Level Name</div>
            <input class="name-input" id="levelName" type="text" placeholder="Level name…" value="Custom Level">
        </div>

        <div>
            <div class="section-title">Tiles</div>
            <div class="palette" id="palette"></div>
        </div>

        <div>
            <div class="section-title">Tool</div>
            <div class="tools">
                <button class="tool-btn active" id="toolPaint">✏ Paint</button>
                <button class="tool-btn"        id="toolFill">⬛ Fill</button>
                <button class="tool-btn"        id="toolErase">⬜ Erase</button>
                <button class="tool-btn"        id="toolEyedrop">💧 Pick</button>
            </div>
            <div class="hint" style="margin-top:6px">
                <kbd>P</kbd> paint &nbsp; <kbd>F</kbd> fill &nbsp; <kbd>E</kbd> erase &nbsp; <kbd>I</kbd> pick<br>
                Right-click anywhere to eyedrop
            </div>
        </div>

        <div>
            <div class="section-title">View</div>
            <div class="zoom-row">
                <button class="zoom-btn" id="zoomOut">−</button>
                <span class="zoom-label" id="zoomLabel">20 px</span>
                <button class="zoom-btn" id="zoomIn">+</button>
            </div>
            <label class="toggle-row">
                <input type="checkbox" id="showGrid" checked>
                <span>Show grid &nbsp;<kbd>G</kbd></span>
            </label>
        </div>

        <div>
            <div class="section-title">History</div>
            <div class="two-col">
                <button class="btn" id="undoBtn" disabled>↩ Undo</button>
                <button class="btn" id="redoBtn" disabled>↪ Redo</button>
            </div>
            <div class="hint"><kbd>Ctrl Z</kbd> undo &nbsp; <kbd>Ctrl Y</kbd> redo</div>
        </div>

        <div>
            <div class="section-title">File</div>
            <button class="btn danger"   id="newBtn">⊕ New Map</button>
            <button class="btn"          id="loadBtn">📂 Load Project</button>
            <button class="btn primary"  id="saveBtn">💾 Save Project</button>
            <button class="btn primary"  id="exportBtn">⬇ Export JS</button>
            <input type="file" id="fileInput" accept=".json" style="display:none">
            <div class="hint" style="margin-top:4px">
                Save = .json roundtrip<br>
                Export = .js array for map.js
            </div>
        </div>

    </div>

    <!-- ── Canvas ── -->
    <div class="canvas-wrap" id="canvasWrap">
        <canvas id="grid"></canvas>
    </div>
</div>

<!-- ── Status bar ── -->
<div class="statusbar">
    <span>Tile: <b id="statTile">—</b></span>
    <span>Pos: <b id="statPos">—</b></span>
    <span>Map: <b>40 × 30</b></span>
    <span id="statMsg"></span>
</div>

<script>
// ================================================================
//  TILE DEFINITIONS  (matches game's terrainTypes + colors)
// ================================================================
const TILES = {
    grass:  { color: '#2d5016', label: 'Grass'  },
    water:  { color: '#1a4d7a', label: 'Water'  },
    sand:   { color: '#d4a574', label: 'Sand'   },
    tree:   { color: '#0a1a0a', label: 'Tree',   accent: '#2d5016' },
    rock:   { color: '#666666', label: 'Rock'   },
    forest: { color: '#0d2610', label: 'Forest' }
};

// ================================================================
//  STATE
// ================================================================
const MAP_W = 40;
const MAP_H = 30;

let tileSize    = 20;
let showGrid    = true;
let currentTile = 'grass';
let currentTool = 'paint'; // 'paint' | 'fill' | 'erase' | 'eyedrop'
let isPainting  = false;

// Flat row-major tile array (index = y * MAP_W + x)
let map = new Array(MAP_W * MAP_H).fill('grass');

// Undo / redo
const MAX_HISTORY = 80;
const undoStack   = [];
const redoStack   = [];
let   dragSnap    = null; // snapshot captured at mousedown, committed on mouseup

// ================================================================
//  CANVAS
// ================================================================
const canvas = document.getElementById('grid');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width  = MAP_W * tileSize;
    canvas.height = MAP_H * tileSize;
}

// ================================================================
//  RENDERING
// ================================================================
function drawTile(tx, ty, type) {
    const def = TILES[type];
    const px  = tx * tileSize;
    const py  = ty * tileSize;

    ctx.fillStyle = def.color;
    ctx.fillRect(px, py, tileSize, tileSize);

    // Tree gets the same green-circle accent the game draws
    if (type === 'tree') {
        ctx.fillStyle = def.accent;
        ctx.beginPath();
        ctx.arc(px + tileSize / 2, py + tileSize / 2, tileSize * 0.33, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawGridLines() {
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth   = 0.5;
    for (let x = 0; x <= MAP_W; x++) {
        ctx.beginPath();
        ctx.moveTo(x * tileSize, 0);
        ctx.lineTo(x * tileSize, MAP_H * tileSize);
        ctx.stroke();
    }
    for (let y = 0; y <= MAP_H; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * tileSize);
        ctx.lineTo(MAP_W * tileSize, y * tileSize);
        ctx.stroke();
    }
}

function fullRedraw() {
    for (let ty = 0; ty < MAP_H; ty++) {
        for (let tx = 0; tx < MAP_W; tx++) {
            drawTile(tx, ty, map[ty * MAP_W + tx]);
        }
    }
    if (showGrid) drawGridLines();
}

function patchTile(tx, ty) {
    // Redraw a single tile plus its border so we don't have to
    // repaint the whole canvas on every mousemove
    drawTile(tx, ty, map[ty * MAP_W + tx]);
    if (showGrid) {
        ctx.strokeStyle = 'rgba(0,0,0,0.35)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(tx * tileSize, ty * tileSize, tileSize, tileSize);
    }
}

// ================================================================
//  COORDINATE HELPERS
// ================================================================
function tileAt(e) {
    const r  = canvas.getBoundingClientRect();
    return {
        tx: Math.floor((e.clientX - r.left)  / tileSize),
        ty: Math.floor((e.clientY - r.top)   / tileSize)
    };
}

function inBounds(tx, ty) {
    return tx >= 0 && tx < MAP_W && ty >= 0 && ty < MAP_H;
}

function getTile(tx, ty) { return map[ty * MAP_W + tx]; }

function setTile(tx, ty, type) {
    if (!inBounds(tx, ty)) return false;
    if (map[ty * MAP_W + tx] === type) return false;
    map[ty * MAP_W + tx] = type;
    patchTile(tx, ty);
    return true;
}

// ================================================================
//  UNDO / REDO
// ================================================================
function snap() { return map.slice(); }

function commitUndo(before) {
    undoStack.push(before);
    if (undoStack.length > MAX_HISTORY) undoStack.shift();
    redoStack.length = 0; // new action clears redo
    refreshHistoryBtns();
}

function undo() {
    if (!undoStack.length) return;
    redoStack.push(snap());
    map = undoStack.pop();
    fullRedraw();
    refreshHistoryBtns();
    flash('Undo');
}

function redo() {
    if (!redoStack.length) return;
    undoStack.push(snap());
    map = redoStack.pop();
    fullRedraw();
    refreshHistoryBtns();
    flash('Redo');
}

function refreshHistoryBtns() {
    document.getElementById('undoBtn').disabled = !undoStack.length;
    document.getElementById('redoBtn').disabled = !redoStack.length;
}

// ================================================================
//  FLOOD FILL (BFS)
// ================================================================
function floodFill(startX, startY, fillType) {
    const target = getTile(startX, startY);
    if (target === fillType) return; // nothing to do

    const before = snap();
    const queue  = [[startX, startY]];
    const seen   = new Set([startY * MAP_W + startX]);

    while (queue.length) {
        const [cx, cy] = queue.shift();
        setTile(cx, cy, fillType);

        for (const [nx, ny] of [[cx-1,cy],[cx+1,cy],[cx,cy-1],[cx,cy+1]]) {
            const key = ny * MAP_W + nx;
            if (inBounds(nx, ny) && !seen.has(key) && getTile(nx, ny) === target) {
                seen.add(key);
                queue.push([nx, ny]);
            }
        }
    }
    commitUndo(before);
}

// ================================================================
//  APPLY CURRENT TOOL
// ================================================================
function applyTool(tx, ty) {
    if (!inBounds(tx, ty)) return;
    switch (currentTool) {
        case 'paint':    setTile(tx, ty, currentTile); break;
        case 'erase':    setTile(tx, ty, 'grass');     break;
        case 'eyedrop':  pickTile(getTile(tx, ty));    break;
    }
}

// ================================================================
//  MOUSE EVENTS
// ================================================================
canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('mousedown', e => {
    e.preventDefault();
    const { tx, ty } = tileAt(e);

    // Right-click always eyedrops
    if (e.button === 2) {
        if (inBounds(tx, ty)) pickTile(getTile(tx, ty));
        return;
    }

    if (currentTool === 'fill') {
        floodFill(tx, ty, currentTile);
        return;
    }

    dragSnap   = snap();
    isPainting = true;
    applyTool(tx, ty);
});

canvas.addEventListener('mousemove', e => {
    const { tx, ty } = tileAt(e);
    updateStatus(tx, ty);
    if (isPainting && (currentTool === 'paint' || currentTool === 'erase')) {
        applyTool(tx, ty);
    }
});

function endDrag() {
    if (isPainting && dragSnap) {
        commitUndo(dragSnap);
        dragSnap = null;
    }
    isPainting = false;
}

canvas.addEventListener('mouseup',    endDrag);
canvas.addEventListener('mouseleave', () => {
    endDrag();
    document.getElementById('statTile').textContent = '—';
    document.getElementById('statPos').textContent  = '—';
});

// ================================================================
//  PALETTE
// ================================================================
function buildPalette() {
    const container = document.getElementById('palette');
    container.innerHTML = '';
    for (const [key, def] of Object.entries(TILES)) {
        const el = document.createElement('div');
        el.className  = 'palette-tile' + (key === currentTile ? ' active' : '');
        el.dataset.tile = key;
        el.innerHTML  = `
            <div class="palette-swatch" style="background:${def.color}"></div>
            <span class="palette-label">${def.label}</span>`;
        el.addEventListener('click', () => pickTile(key));
        container.appendChild(el);
    }
}

function pickTile(key) {
    if (!TILES[key]) return;
    currentTile = key;
    // If we were eyedropping, switch back to paint so the user can immediately use the pick
    if (currentTool === 'eyedrop') selectTool('paint');
    document.querySelectorAll('.palette-tile').forEach(el =>
        el.classList.toggle('active', el.dataset.tile === key));
    flash(`Selected: ${TILES[key].label}`);
}

// ================================================================
//  TOOLS
// ================================================================
const TOOL_IDS = { paint: 'toolPaint', fill: 'toolFill', erase: 'toolErase', eyedrop: 'toolEyedrop' };

function selectTool(tool) {
    currentTool = tool;
    for (const [t, id] of Object.entries(TOOL_IDS)) {
        document.getElementById(id).classList.toggle('active', t === tool);
    }
}

// ================================================================
//  ZOOM
// ================================================================
const ZOOMS   = [8, 10, 12, 16, 20, 24, 28, 32, 40];
let   zoomIdx = ZOOMS.indexOf(20);

function setZoom(idx) {
    zoomIdx  = Math.max(0, Math.min(ZOOMS.length - 1, idx));
    tileSize = ZOOMS[zoomIdx];
    document.getElementById('zoomLabel').textContent = tileSize + ' px';
    resizeCanvas();
    fullRedraw();
}

// ================================================================
//  STATUS BAR
// ================================================================
function updateStatus(tx, ty) {
    if (inBounds(tx, ty)) {
        document.getElementById('statTile').textContent = TILES[getTile(tx,ty)].label;
        document.getElementById('statPos').textContent  = `${tx}, ${ty}`;
    }
}

let flashTimer = null;
function flash(msg) {
    const el = document.getElementById('statMsg');
    el.textContent = msg;
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => el.textContent = '', 2200);
}

// ================================================================
//  FILE: NEW, SAVE, LOAD, EXPORT
// ================================================================
function newMap() {
    if (!confirm('Clear the map and start fresh?')) return;
    commitUndo(snap());
    map = new Array(MAP_W * MAP_H).fill('grass');
    fullRedraw();
    flash('New map — all grass');
}

function saveProject() {
    const name    = document.getElementById('levelName').value.trim() || 'custom_level';
    const payload = JSON.stringify({ name, width: MAP_W, height: MAP_H, tiles: map }, null, 2);
    download(slugify(name) + '.json', payload, 'application/json');
    flash('Project saved!');
}

function exportJS() {
    const name    = document.getElementById('levelName').value.trim() || 'Custom Level';
    const varName = (slugify(name, true) || 'custom') + 'Map';

    // Format as one row per line with a y-index comment — matches the style
    // of woodsMap/beachMap in map.js so it can be pasted straight in.
    const rows = [];
    for (let y = 0; y < MAP_H; y++) {
        const cells = map.slice(y * MAP_W, (y + 1) * MAP_W)
                         .map(t => `'${t}'`)
                         .join(', ');
        rows.push(`  /* y=${String(y).padStart(2)} */  ${cells}`);
    }

    const js = [
        `// Level: ${name}`,
        `// Generated by Silly Little Friends Level Designer v0.0.1`,
        `// Map size: ${MAP_W} × ${MAP_H} tiles`,
        `//`,
        `// Paste this array into map.js and hook it up like woodsMap / beachMap.`,
        `const ${varName} = [`,
        rows.join(',\n'),
        `];`
    ].join('\n');

    download(varName + '.js', js, 'text/javascript');
    flash('Exported!');
}

function loadProject(file) {
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const data = JSON.parse(e.target.result);
            if (!Array.isArray(data.tiles))
                throw new Error('Missing "tiles" array');
            if (data.tiles.length !== MAP_W * MAP_H)
                throw new Error(`Expected ${MAP_W * MAP_H} tiles, got ${data.tiles.length}`);
            for (const t of data.tiles)
                if (!TILES[t]) throw new Error(`Unknown tile type "${t}"`);

            commitUndo(snap());
            map = data.tiles;
            if (data.name) document.getElementById('levelName').value = data.name;
            fullRedraw();
            flash(`Loaded: ${data.name || file.name}`);
        } catch (err) {
            flash(`Load failed: ${err.message}`);
        }
    };
    reader.readAsText(file);
}

// ── Helpers ────────────────────────────────────────────────────
function download(filename, content, type) {
    const a = Object.assign(document.createElement('a'), {
        href:     URL.createObjectURL(new Blob([content], { type })),
        download: filename
    });
    a.click();
    URL.revokeObjectURL(a.href);
}

function slugify(str, camel = false) {
    // camel=false → snake_case for filenames, camel=true → camelCase for JS identifiers
    const words = str.replace(/[^a-zA-Z0-9 ]/g, '').trim().split(/\s+/);
    if (camel) return words.map((w, i) =>
        i === 0 ? w.toLowerCase() : w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()
    ).join('');
    return words.join('_').toLowerCase();
}

// ================================================================
//  WIRE UP CONTROLS
// ================================================================
document.getElementById('toolPaint').addEventListener('click',   () => selectTool('paint'));
document.getElementById('toolFill').addEventListener('click',    () => selectTool('fill'));
document.getElementById('toolErase').addEventListener('click',   () => selectTool('erase'));
document.getElementById('toolEyedrop').addEventListener('click', () => selectTool('eyedrop'));

document.getElementById('zoomIn').addEventListener('click',  () => setZoom(zoomIdx + 1));
document.getElementById('zoomOut').addEventListener('click', () => setZoom(zoomIdx - 1));

document.getElementById('showGrid').addEventListener('change', e => {
    showGrid = e.target.checked;
    fullRedraw();
});

document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('redoBtn').addEventListener('click', redo);
document.getElementById('newBtn').addEventListener('click',  newMap);
document.getElementById('saveBtn').addEventListener('click', saveProject);
document.getElementById('exportBtn').addEventListener('click', exportJS);
document.getElementById('loadBtn').addEventListener('click',  () =>
    document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) loadProject(e.target.files[0]);
    e.target.value = '';
});

// ── Keyboard shortcuts ──────────────────────────────────────────
document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;

    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); return; }
    if (e.ctrlKey && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) {
        e.preventDefault(); redo(); return;
    }
    if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveProject(); return; }

    switch (e.key.toLowerCase()) {
        case 'p': selectTool('paint');    break;
        case 'f': selectTool('fill');     break;
        case 'e': selectTool('erase');    break;
        case 'i': selectTool('eyedrop');  break;
        case 'g':
            const cb = document.getElementById('showGrid');
            cb.checked = !cb.checked;
            showGrid = cb.checked;
            fullRedraw();
            break;
        case '=': case '+': setZoom(zoomIdx + 1); break;
        case '-':            setZoom(zoomIdx - 1); break;
    }
});

// ================================================================
//  INIT
// ================================================================
buildPalette();
resizeCanvas();
fullRedraw();
</script>
</body>
</html>
